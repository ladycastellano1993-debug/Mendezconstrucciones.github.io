<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mendez Construções AAA | Engenharia e Acabamentos em Londrina</title>

    <meta property="og:title" content="Mendez Construções AAA">
    <meta property="og:description" content="Engenharia de acabamentos e reformas de alto padrão em Londrina e região.">
    <meta property="og:image" content="logotipoempresa.jpg.jpg">
    <meta property="og:type" content="website">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        :root { --gold: #d4af37; --black: #000; --dark-grey: #0f0f0f; --light-grey: #1a1a1a; }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background-color: var(--black); color: #fff; text-align: center; scroll-behavior: smooth; }
        .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; padding-bottom: 120px; }
        
        /* Cabeçalho */
        .header-box { margin-bottom: 50px; }
        .main-logo { max-width: 280px; border: 2px solid var(--gold); border-radius: 15px; margin-bottom: 20px; box-shadow: 0 0 25px rgba(212, 175, 55, 0.4); }
        .aaa-title { font-size: 60px; font-weight: bold; color: var(--gold); margin: 0; letter-spacing: 12px; }
        .subtitle { color: var(--gold); text-transform: uppercase; margin-bottom: 40px; font-weight: bold; letter-spacing: 5px; font-size: 22px; }
        
        /* Seções */
        .section-title { color: var(--gold); text-transform: uppercase; margin-bottom: 30px; border-bottom: 2px solid var(--gold); display: inline-block; padding-bottom: 10px; }
        .about-section { background: var(--dark-grey); border: 1px solid var(--gold); padding: 40px; border-radius: 20px; margin-bottom: 50px; line-height: 1.8; text-align: left; }

        /* Grid de Portfólio */
        .portfolio-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; }
        .portfolio-item { background: var(--light-grey); border: 1px solid var(--gold); border-radius: 15px; overflow: hidden; text-align: left; transition: 0.4s; }
        .portfolio-item:hover { transform: translateY(-8px); box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3); }
        .portfolio-item img { width: 100%; height: 280px; object-fit: cover; display: block; border-bottom: 1px solid var(--gold); }
        
        .portfolio-desc { padding: 25px; }
        .portfolio-desc h3 { color: var(--gold); margin: 0 0 15px 0; font-size: 22px; text-transform: uppercase; display: flex; align-items: center; gap: 10px; }
        .skills-list { margin: 0; padding: 0; list-style: none; font-size: 14px; color: #ccc; }
        .skills-list li { margin-bottom: 8px; display: flex; align-items: start; gap: 10px; }
