<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mendez Construções | Londrina</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --dark: #121212; --card-bg: #1c1c1c; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding-bottom: 80px; }
        
        header { padding: 40px 20px; border-bottom: 2px solid var(--gold); background: #000; }
        
        .logo-container { margin-bottom: 15px; }
        .logo { max-width: 350px; width: 90%; height: auto; border-radius: 8px; }
        
        .location-info { color: var(--gold); font-size: 1.4rem; font-weight: bold; margin: 15px 0; display: block; text-transform: uppercase; letter-spacing: 2px; }
        .location-info i { margin-right: 10px; color: #ff4d4d; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; padding: 40px; max-width: 1300px; margin: auto; }
        .card { background: var(--card-bg); border: 1px solid #333; border-radius: 15px; overflow: hidden; text-align: left; transition: 0.3s; }
        .card:hover { border-color: var(--gold); transform: translateY(-5px); }
        .card img { width: 100%; height: 250px; object-fit: cover; border-bottom: 2px solid var(--gold); }
        
        .card-content { padding: 25px; }
        .card h3 { color: var(--gold); margin: 0 0 15px 0; text-transform: uppercase; font-size: 1.4rem; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .skills-list { padding: 0; list-style: none; font-size: 0.95rem; color: #e0e0e0; line-height: 1.6; }
        .skills-list li { margin-bottom: 10px; display: flex; align-items: flex-start; }
        .skills-list li::before { content: "✔"; color: var(--gold); margin-right: 12px; font-weight: bold; }

        .budget-btn { display: inline-block; background: var(--gold); color: black; padding: 20px 40px; border-radius: 50px; text-decoration: none; font-weight: bold; font-size: 1.2rem; transition: 0.3s; box-shadow: 0 4px 20px rgba(212, 175, 55, 0.4); margin-top: 15px; }
        .budget-btn:hover { background: #fff; transform: scale(1.05); }

        /* Botão Flutuante de WhatsApp Atualizado */
        .social-float { position: fixed; right: 20px; bottom: 30px; display: flex; flex-direction: column; gap: 15px; z-index: 1000; }
        .s-btn { width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; text-decoration: none; font-size: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.8); transition: 0.3s; }
        .insta { background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%); }
        .tik { background: #000; border: 1px solid #fff; }
        .wapp { background: #25D366; animation: pulse 2s infinite; }
