<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mendez Construcciones | Londrina</title>
    <style>
        :root { --gold: #D4AF37; --dark: #121212; }
        body { background: var(--dark); color: white; font-family: 'Times New Roman', serif; text-align: center; margin: 0; }
        header { padding: 50px; border-bottom: 2px solid var(--gold); }
        .logo { max-width: 250px; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; padding: 40px; }
        .card { background: #1c1c1c; border: 1px solid #333; border-radius: 10px; overflow: hidden; }
        .card:hover { border-color: var(--gold); }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card h3 { color: var(--gold); padding: 10px; }
        .btn-ws { display: inline-block; background: #25D366; color: white; padding: 15px 30px; text-decoration: none; border-radius: 50px; font-weight: bold; margin: 40px; }
    </style>
</head>
<body>

<header>
    <img src="mendez-web/logotipoempresa.jpg.jpg" class="logo" alt="Logo Mendez">
    <h1>MENDEZ CONSTRUCCIONES</h1>
    <p>Excelência em Cada Obra - Londrina, PR</p>
</header>

<div class="grid">
    <div class="card">
        <img src="mendez-web/engenhariaeacabamento.jpg.jpg">
        <h3>Serviço de Obra</h3>
        <p>Alvenaria e Acabamentos Premium</p>
    </div>
    <div class="card">
        <img src="mendez-web/sistemasdedrywall.jpg.jpg">
        <h3>Drywall</h3>
        <p>Sistemas Modernos e Divisórias</p>
    </div>
    <div class="card">
        <img src="mendez-web/instalacoes-eletricas.png.png">
        <h3>Elétrica</h3>
        <p>Instalações Seguras e Completas</p>
    </div>
    <div class="card">
        <img src="mendez-web/carpintariapremium.jpg.jpg">
        <h3>Carpintaria</h3>
        <p>Estruturas e Acabamentos em Madeira</p>
    </div>
</div>

<a href="https://wa.me/5543999999999" class="btn-ws">Solicitar Orçamento via WhatsApp</a>

</body>
</html>
